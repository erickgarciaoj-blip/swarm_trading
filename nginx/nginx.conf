# Mounted at /etc/nginx/conf.d/default.conf (see docker-compose.yml, "nginx"
# service, profile "proxy") — replaces the stock nginx:alpine default.conf,
# it is not a full nginx.conf. The base image's own nginx.conf already does
# `include /etc/nginx/conf.d/*.conf;`, so only the server block belongs here.

# "swarm" is resolved via Docker's embedded DNS on swarm_net — this must
# stay a runtime variable (not a bare proxy_pass hostname) so nginx doesn't
# fail to start if "swarm" isn't resolvable yet at container boot.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    set $swarm_upstream swarm:8000;

    # Plain liveness passthrough — same endpoint the "swarm" container's own
    # HEALTHCHECK hits directly. Kept unbuffered/no-cache so a load balancer
    # or uptime probe in front of nginx always sees a live answer.
    location = /health {
        proxy_pass http://$swarm_upstream;
        proxy_http_version 1.1;
        access_log off;
    }

    # WebSocket upgrade — dashboard/websocket.py speaks ws:// under /ws.
    # Connection/Upgrade headers must be forwarded explicitly; nginx does
    # not do this by default for proxied requests.
    location /ws {
        proxy_pass http://$swarm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://$swarm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

