repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^alembic/versions/
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Fase 4.6 (PR 2/4) — scripts de deployment de staging. Lista
        # explícita, no todo scripts/*.sh: install_macos.sh/setup.sh (Fase 2)
        # tienen hallazgos propios (SC1091) fuera del alcance de este PR.
        # También corre como gate real en CI (job "lint") — ver ci.yml.
        files: ^scripts/(ci-deploy-entrypoint|ci-deploy-integration-lib|deploy|rollback|test_ci_deploy_entrypoint_rejects_invalid_input|test_ci_deploy_entrypoint_shared_env|test_deploy_and_rollback_scripts)\.sh$

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # scripts/run_mypy_precommit.sh — portable across the main checkout,
        # any git worktree, or any other checkout name/location. Directly
        # hardcoding `.venv/bin/mypy` + PYTHONPATH here broke in any worktree
        # not literally named `swarm_trading` (see ADR-0002 on why mypy cares
        # about that name at all); the script resolves the main checkout's
        # .venv and the naming requirement without assuming either. Validate
        # changes to it with scripts/test_precommit_worktree_portability.sh.
        # Runs on the whole project (pass_filenames: false), not just staged
        # files, because per-file invocation hits "found twice under
        # different module names" given that same layout quirk.
        entry: scripts/run_mypy_precommit.sh
        language: script
        types: [python]
        exclude: ^alembic/
        pass_filenames: false
