repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^alembic/versions/
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # PYTHONPATH=.. — this repo's root package is literally named
        # `swarm_trading` (see ADR-0002); mypy needs the *parent* dir on the
        # path to resolve `swarm_trading.*` imports, same as running the app.
        # Runs on the whole project (pass_filenames: false), not just staged
        # files, because per-file invocation hits "found twice under
        # different module names" given that same layout quirk.
        entry: bash -c 'PYTHONPATH="$(cd .. && pwd)" .venv/bin/mypy --config-file pyproject.toml .'
        language: system
        types: [python]
        exclude: ^alembic/
        pass_filenames: false
