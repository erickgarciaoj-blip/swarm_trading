name: CI

on:
  push:
    branches: [main]
  pull_request:

# No deploy job here on purpose (see ARCHITECTURE_REVIEW.md — Fase 2 scope
# is quality gates only, deploy stays manual until it's explicitly asked for).

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # path: swarm_trading — the app imports itself as `swarm_trading.*`,
      # which only resolves if the checkout directory is literally named
      # that (see docs/architecture/adr/0002). GitHub normally checks out
      # into a dir named after the repo, which may not match, so this pins
      # it regardless of what the repo itself is called.
      - uses: actions/checkout@v4
        with:
          path: swarm_trading
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: swarm_trading/requirements-dev.txt
      - run: pip install -r swarm_trading/requirements-dev.txt
      - name: ruff check
        run: cd swarm_trading && ruff check .
      - name: ruff format --check
        run: cd swarm_trading && ruff format --check .
      - name: shellcheck (deploy scripts, Fase 4.6)
        # ubuntu-latest ships shellcheck preinstalled — no install step.
        # Gate real en CI, no solo en pre-commit (Fase 4.6, PR 2/4). Lista
        # explícita, no scripts/*.sh — install_macos.sh/setup.sh (Fase 2,
        # ajenos a este PR) tienen hallazgos propios (SC1091) que no es
        # alcance de este PR corregir; ampliar el gate a todo scripts/ queda
        # para un PR futuro que decida abordarlos.
        run: |
          cd swarm_trading
          shellcheck \
            scripts/ci-deploy-entrypoint.sh \
            scripts/ci-deploy-integration-lib.sh \
            scripts/deploy.sh \
            scripts/rollback.sh \
            scripts/test_ci_deploy_entrypoint_rejects_invalid_input.sh \
            scripts/test_ci_deploy_entrypoint_shared_env.sh \
            scripts/test_deploy_and_rollback_scripts.sh

      - name: entrypoint bundle validation tests (no Docker, Fase 4.6)
        # Antes solo se pasaban por shellcheck, nunca se ejecutaban en CI —
        # cerrado junto con el gap de shared/.env: "agregar pruebas" implica
        # que corran, no solo que analicen sintaxis limpia.
        run: |
          cd swarm_trading
          bash scripts/test_ci_deploy_entrypoint_rejects_invalid_input.sh

      - name: entrypoint shared/.env validation tests (no Docker, Fase 4.6)
        run: |
          cd swarm_trading
          bash scripts/test_ci_deploy_entrypoint_shared_env.sh

      - name: deploy/rollback direct tests (no Docker, Fase 4.6)
        run: |
          cd swarm_trading
          bash scripts/test_deploy_and_rollback_scripts.sh

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: swarm_trading/requirements-dev.txt
      - run: pip install -r swarm_trading/requirements-dev.txt
      - name: mypy
        working-directory: swarm_trading
        run: PYTHONPATH="$GITHUB_WORKSPACE" mypy --config-file pyproject.toml .
      - name: mypy pre-commit hook worktree portability
        # Validates scripts/run_mypy_precommit.sh (wired into
        # .pre-commit-config.yaml) from a hostile-named git worktree, not
        # just the direct mypy invocation above. The script expects the main
        # checkout's mypy at .venv/bin/mypy (never a per-worktree venv, see
        # its own comments) — CI installs mypy straight into the runner's
        # Python instead of a .venv, so this symlinks it into the expected
        # spot without a redundant second install.
        working-directory: swarm_trading
        run: |
          mkdir -p .venv/bin
          ln -s "$(command -v mypy)" .venv/bin/mypy
          scripts/test_precommit_worktree_portability.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is requires-python's actual floor (see pyproject.toml); 3.13
        # is what's used day-to-day in dev. Both must genuinely work — this
        # is what caught numpy 2.5.x silently having dropped 3.11 wheels
        # during Fase 2's dependency audit (see ADR-0005), a class of break
        # a single-version job would never have surfaced.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: swarm_trading/requirements-dev.txt
      - run: pip install -r swarm_trading/requirements-dev.txt
      - name: pip check (no conflicting/missing transitive dependencies)
        run: pip check
      - name: pytest + coverage
        working-directory: swarm_trading
        run: PYTHONPATH="$GITHUB_WORKSPACE" pytest tests/ -v
      - uses: actions/upload-artifact@v4
        if: always() && matrix.python-version == env.PYTHON_VERSION
        with:
          name: coverage-html
          path: swarm_trading/htmlcov/
          retention-days: 14

  alembic-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: swarm_trading/requirements-dev.txt
      - run: pip install -r swarm_trading/requirements-dev.txt
      - name: Migrations apply cleanly on a fresh DB
        working-directory: swarm_trading
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./ci_alembic_check.db"
        run: PYTHONPATH="$GITHUB_WORKSPACE" alembic upgrade head

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading
      - name: Build production image
        run: docker build -t swarm-trading:ci swarm_trading

  postgres-integration:
    # Real postgres:16 (matches docker-compose.yml's pin) as a service
    # container — Alembic is the sole schema authority (see ADR-0008), so
    # this job applies migrations against it for real, then runs
    # tests/integration/* against that actual schema. No SQLite fallback
    # anywhere in this job: DATABASE_URL always points at the service
    # container below, and the job fails outright if it's unreachable.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: swarm_trading_test
          POSTGRES_USER: swarm
          POSTGRES_PASSWORD: swarm_ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swarm -d swarm_trading_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://swarm:swarm_ci_test_password@localhost:5432/swarm_trading_test
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: swarm_trading/requirements-dev.txt
      - run: pip install -r swarm_trading/requirements-dev.txt
      - name: pip check
        run: pip check
      - name: alembic upgrade head (creates the real schema)
        working-directory: swarm_trading
        run: PYTHONPATH="$GITHUB_WORKSPACE" alembic upgrade head
      - name: alembic current
        working-directory: swarm_trading
        run: PYTHONPATH="$GITHUB_WORKSPACE" alembic current
      - name: alembic check (models match migrations, no drift)
        working-directory: swarm_trading
        run: PYTHONPATH="$GITHUB_WORKSPACE" alembic check
      - name: alembic downgrade -1, then upgrade head again (reversibility)
        working-directory: swarm_trading
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE" alembic downgrade -1
          PYTHONPATH="$GITHUB_WORKSPACE" alembic upgrade head
      - name: pytest tests/integration (real PostgreSQL, no coverage gate here)
        working-directory: swarm_trading
        run: PYTHONPATH="$GITHUB_WORKSPACE" pytest tests/integration/ -m integration -v --no-cov

  docker-stack-integration:
    # End-to-end validation of docker-compose.yml itself, not just the image.
    # docker-build above only proves the image builds; this proves the stack
    # it's part of actually comes up in the right order (see ADR-0009):
    # migration-as-gate really gates, liveness/readiness are really separate,
    # and the optional nginx profile really proxies a live WebSocket.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: swarm_trading
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading

      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          APP_ENV=development
          POSTGRES_DB=swarm_trading_ci
          POSTGRES_USER=swarm
          POSTGRES_PASSWORD=swarm_ci_stack_password
          DATABASE_URL=postgresql+asyncpg://swarm:swarm_ci_stack_password@postgres:5432/swarm_trading_ci
          REDIS_URL=redis://redis:6379/0
          EOF

      - name: Build images (including the proxy profile, so a broken nginx build fails here)
        run: docker compose --profile proxy build

      - name: Bring up the stack (postgres -> migrate -> swarm, per the depends_on gate)
        run: docker compose up -d --wait --wait-timeout 120

      - name: Liveness (/health) — must never depend on Postgres/Redis
        run: |
          curl -sf http://127.0.0.1:8000/health \
            | python3 -c "import sys, json; d = json.load(sys.stdin); assert d == {'status': 'ok'}, d"

      - name: Readiness (/health/ready) — confirms Postgres is actually reachable
        run: |
          curl -sf http://127.0.0.1:8000/health/ready \
            | python3 -c "import sys, json; d = json.load(sys.stdin); assert d == {'status': 'ok'}, d"

      - name: "PyTorch is the CPU-only build; no CUDA/NVIDIA anywhere; a minimal RL load+inference works"
        run: |
          docker compose exec -T swarm python <<'PYEOF'
          import subprocess
          import sys

          import torch

          print(f"torch version: {torch.__version__}")
          assert "+cpu" in torch.__version__, f"expected the +cpu build, got {torch.__version__}"
          assert torch.cuda.is_available() is False, "CUDA must not be available in the CPU-only build"

          installed = subprocess.check_output([sys.executable, "-m", "pip", "list"], text=True).splitlines()
          nvidia_pkgs = [line for line in installed if line.lower().startswith("nvidia-")]
          assert not nvidia_pkgs, f"unexpected NVIDIA packages installed: {nvidia_pkgs}"

          # Same construction RLAgent._build_fresh_model() uses for a
          # cold-start agent (agents/rl/rl_agent.py) — proves the CPU wheel
          # can actually build a policy network and run a forward pass
          # through this project's own env, not just import successfully.
          import pandas as pd
          from stable_baselines3 import PPO

          from swarm_trading.agents.rl.env import SwarmTradingEnv

          dummy_df = pd.DataFrame(
              [{"close": 1.0, "rsi_14": 50.0, "atr_14": 0.01, "ema_20": 1.0, "ema_50": 1.0, "ema_200": 1.0}] * 2
          )
          env = SwarmTradingEnv(dummy_df)
          model = PPO("MlpPolicy", env, verbose=0)
          obs, _ = env.reset()
          action, _ = model.predict(obs, deterministic=True)
          print(f"minimal RL load+inference OK, action={int(action)}")
          PYEOF

      - name: Final image contains no dev-only files (.dockerignore took effect)
        run: |
          docker compose run --rm --no-deps --entrypoint sh swarm -c '
            set -e
            for f in tests requirements-dev.txt .pre-commit-config.yaml README.md ARCHITECTURE_REVIEW.md docs .git .github; do
              if [ -e "/app/swarm_trading/$f" ]; then
                echo "unexpected in final image: $f" >&2
                exit 1
              fi
            done
            test -f /app/swarm_trading/alembic.ini
            test -d /app/swarm_trading/alembic
          '

      - name: Report final image size
        run: docker images swarm_trading-swarm --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}'

      - name: "Negative test: a failing migration must block swarm from starting"
        # Isolated Compose project (-p) plus an override that makes "migrate"
        # fail deterministically — this can never collide with, or be masked
        # by, the primary stack already running above.
        run: |
          cat > ci-migration-gate-override.yml <<'EOF'
          services:
            migrate:
              entrypoint: ["sh", "-c", "echo 'CI: intentionally broken migration' >&2; exit 1"]
          EOF
          set +e
          docker compose -p swarm_gate_ci -f docker-compose.yml -f ci-migration-gate-override.yml up -d --wait --wait-timeout 60
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "expected 'docker compose up' to fail on a broken migration, it succeeded" >&2
            exit 1
          fi
          running="$(docker compose -p swarm_gate_ci -f docker-compose.yml -f ci-migration-gate-override.yml ps -q swarm)"
          if [ -n "$running" ]; then
            echo "'swarm' container exists despite the migration gate failing" >&2
            exit 1
          fi
          echo "Migration gate held: swarm correctly never started."

      - name: Diagnostics for the migration-gate project (on failure)
        if: failure()
        run: |
          docker compose -p swarm_gate_ci -f docker-compose.yml -f ci-migration-gate-override.yml ps
          docker compose -p swarm_gate_ci -f docker-compose.yml -f ci-migration-gate-override.yml logs

      - name: Tear down the migration-gate project
        if: always()
        run: |
          docker compose -p swarm_gate_ci -f docker-compose.yml -f ci-migration-gate-override.yml down -v
          rm -f ci-migration-gate-override.yml

      - name: Bring up the reverse proxy (--profile proxy)
        run: docker compose --profile proxy up -d --wait --wait-timeout 60 nginx

      - name: Real WebSocket round-trip through nginx
        run: |
          pip install --quiet websocket-client
          python3 - <<'EOF'
          import json

          from websocket import create_connection

          ws = create_connection("ws://127.0.0.1:8080/ws", timeout=10)
          try:
              raw = ws.recv()
          finally:
              ws.close()

          snapshot = json.loads(raw)
          assert isinstance(snapshot, dict), f"expected a JSON object over the proxied WebSocket, got {snapshot!r}"
          EOF

      - name: Full diagnostics on failure (primary stack)
        if: failure()
        run: |
          docker compose --profile proxy ps
          docker compose --profile proxy logs

      - name: Tear down the primary stack
        if: always()
        run: docker compose --profile proxy down -v

  deploy-scripts-docker-integration:
    # Fase 4.6 (PR 2/4, cierre de validaciones) — integración REAL con
    # Docker/Compose para scripts/{deploy,rollback,ci-deploy-entrypoint}.sh.
    # A diferencia de test_deploy_and_rollback_scripts.sh (sin Docker) y de
    # test_ci_deploy_entrypoint_rejects_invalid_input.sh (Docker simulado con
    # un binario `docker` falso), este job corre los tres scripts reales
    # contra Docker/Compose reales — backup, migración, health checks,
    # rollback automático y manual, flock concurrente, digest/label OCI, todo
    # de punta a punta, sin mocks. Job aislado a propósito, separado de
    # docker-stack-integration (que valida docker-compose.yml de desarrollo,
    # no el pipeline de deploy de staging) — reutiliza el mismo patrón
    # general (levantar Compose real, verificar con curl/docker inspect,
    # limpiar siempre al final) pero sobre docker-compose.staging.yml y los
    # tres scripts de esta fase.
    #
    # Nunca se conecta al VPS real ni a GHCR real: las imágenes de prueba se
    # construyen y etiquetan localmente con el nombre que IMAGE_REPO espera
    # (ghcr.io/erickgarciaoj-blip/swarm_trading) — un tag puramente local,
    # nunca empujado ahí — y el digest real que exige ADR-0011 se obtiene de
    # un registry Docker local efímero (localhost:5000), nunca de ghcr.io.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: swarm_trading
    env:
      SWARM_ROOT: ${{ runner.temp }}/swarm-deploy-root
      # SHAs sintéticos (40 hex minúsculas) — uno por escenario, para que los
      # logs y los mensajes de error de cada script identifiquen sin ambigüedad
      # a qué caso de prueba pertenecen.
      SHA_A: "a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1a1" # primer deploy, vía el entrypoint real
      SHA_B: "b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2b2" # segundo deploy directo + redeploy + rollback target
      SHA_C: "c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3c3" # variante "swarm" con DATABASE_URL inalcanzable (health check falla)
      SHA_D: "d4d4d4d4d4d4d4d4d4d4d4d4d4d4d4d4d4d4d4d4" # variante "migrate" que falla a propósito
      SHA_E: "e5e5e5e5e5e5e5e5e5e5e5e5e5e5e5e5e5e5e5e5" # deploy usado para el escenario de fallo de backup
      SHA_F: "f6f6f6f6f6f6f6f6f6f6f6f6f6f6f6f6f6f6f6f6" # segundo deploy en el escenario de flock concurrente
    steps:
      - uses: actions/checkout@v4
        with:
          path: swarm_trading

      - name: Local Docker registry (never ghcr.io, never the VPS)
        run: |
          docker run -d --name local-registry -p 5000:5000 registry:2
          for _ in $(seq 1 20); do
            curl -sf http://127.0.0.1:5000/v2/ >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:5000/v2/ >/dev/null

      - name: Build the shared application image once (real Dockerfile, reused per-SHA via `docker commit`)
        run: docker build -t swarm_test_base:ci .

      - name: Write .env fixture used by every scenario below
        # La lógica compartida (dc, build_release_image, prepare_release_dir,
        # setup_shared_env, assert_*) vive en scripts/ci-deploy-integration-lib.sh
        # — un archivo versionado, no un heredoc embebido aquí — para que
        # quede bajo ShellCheck/pre-commit como cualquier otro script y sea
        # diffable normalmente. Cada step de este job la trae con
        # `source scripts/ci-deploy-integration-lib.sh`.
        run: |
          # Doble uso, a propósito: (a) fuente de contenido para el único
          # shared/.env real (setup_shared_env, más abajo — cada release lo
          # consume por symlink, nunca por copia) y (b) --env-file de este
          # job para sus propios comandos `dc ...` ad hoc (postgres exec,
          # ps, config) — ambos deben coincidir porque son, en la práctica,
          # el mismo archivo una vez que el symlink existe.
          cat > .ci-env-fixture <<'ENVEOF'
          APP_ENV=development
          POSTGRES_DB=swarm_trading_ci_deploy
          POSTGRES_USER=swarm
          POSTGRES_PASSWORD=swarm_ci_deploy_password
          DATABASE_URL=postgresql+asyncpg://swarm:swarm_ci_deploy_password@postgres:5432/swarm_trading_ci_deploy
          REDIS_URL=redis://redis:6379/0
          ENVEOF

          # Variante "swarm" con DATABASE_URL apuntando a un host que no
          # existe en la red de Compose — deja migrate (que sigue apuntando
          # a "postgres" real) sano, y /health (liveness) sano, pero
          # /health/ready (requiere Postgres alcanzable) siempre en 503: el
          # health check real de deploy.sh/rollback.sh, no un mock.
          awk '/^  swarm:/{f=1} f && /@postgres:5432/{gsub(/@postgres:5432/, "@postgres-unreachable:5432")} {print}' \
              docker-compose.staging.yml > docker-compose.staging.broken-health.yml

          # Variante "migrate" que falla a propósito — deploy.sh debe
          # abortar sin tocar jamás al servicio "swarm" ya corriendo.
          sed 's#entrypoint: \["alembic", "upgrade", "head"\]#entrypoint: ["sh", "-c", "echo CI-INTENTIONAL-MIGRATION-FAILURE >\&2; exit 1"]#' \
              docker-compose.staging.yml > docker-compose.staging.broken-migrate.yml
          grep -q "CI-INTENTIONAL-MIGRATION-FAILURE" docker-compose.staging.broken-migrate.yml

      - name: Build per-SHA images (real OCI label baked in, real digest via the local registry)
        run: |
          source scripts/ci-deploy-integration-lib.sh
          {
            echo "DIGEST_A=$(build_release_image "$SHA_A")"
            echo "DIGEST_B=$(build_release_image "$SHA_B")"
            echo "DIGEST_C=$(build_release_image "$SHA_C")"
            echo "DIGEST_D=$(build_release_image "$SHA_D")"
            echo "DIGEST_E=$(build_release_image "$SHA_E")"
            echo "DIGEST_F=$(build_release_image "$SHA_F")"
          } >> "$GITHUB_ENV"

      - name: "Prepare shared/.env and releases/ for the SHAs deployed directly (bypassing the entrypoint on purpose)"
        run: |
          source scripts/ci-deploy-integration-lib.sh
          setup_shared_env
          # SHA_A NO se pre-siembra aquí — pasa por ci-deploy-entrypoint.sh
          # real más abajo, que crea y valida su propio symlink hacia
          # shared/.env (paso 4 del entrypoint) sobre una extracción
          # PROMOTED limpia, sin necesitar ningún atajo.
          prepare_release_dir "$SHA_B" docker-compose.staging.yml "$DIGEST_B"
          prepare_release_dir "$SHA_C" docker-compose.staging.broken-health.yml "$DIGEST_C"
          prepare_release_dir "$SHA_D" docker-compose.staging.broken-migrate.yml "$DIGEST_D"
          prepare_release_dir "$SHA_E" docker-compose.staging.yml "$DIGEST_E"
          prepare_release_dir "$SHA_F" docker-compose.staging.yml "$DIGEST_F"
          chmod +x scripts/deploy.sh scripts/rollback.sh scripts/ci-deploy-entrypoint.sh

      - name: "Scenario: primer deploy con Postgres ya corriendo y con datos (via ci-deploy-entrypoint.sh real — digest real, label OCI, current no se mueve hasta health OK)"
        run: |
          source scripts/ci-deploy-integration-lib.sh

          # Postgres arriba ANTES de que exista ningún release ni "current"
          # — la condición exacta que hace que deploy.sh SÍ intente backup en
          # lo que, por no existir "current" todavía, es igualmente el
          # primer deploy.
          dc up -d --wait postgres
          dc exec -T postgres \
              psql -U swarm -d swarm_trading_ci_deploy -c \
              "CREATE TABLE ci_backup_marker (id serial primary key, note text); INSERT INTO ci_backup_marker (note) VALUES ('pre-existing-data');"
          assert_eq "$(current_sha)" "<none>" "current no existe todavía (verdadero primer deploy)"

          # SHA_A no fue pre-sembrada — esta es una extracción PROMOTED
          # limpia. shared/.env ya existe (setup_shared_env, paso previo);
          # el propio entrypoint valida sus permisos/propietario y crea
          # releases/$SHA_A/.env -> ../../shared/.env por su cuenta (paso 4
          # del entrypoint) — el bundle nunca transporta ".env" (fuera de la
          # allowlist).
          mkdir -p bundle_a/scripts
          cp docker-compose.yml bundle_a/docker-compose.yml
          cp docker-compose.staging.yml bundle_a/docker-compose.staging.yml
          cp scripts/deploy.sh bundle_a/scripts/deploy.sh
          cp scripts/rollback.sh bundle_a/scripts/rollback.sh
          chmod +x bundle_a/scripts/deploy.sh bundle_a/scripts/rollback.sh
          CHECKSUM="$(cat bundle_a/docker-compose.yml bundle_a/docker-compose.staging.yml bundle_a/scripts/deploy.sh bundle_a/scripts/rollback.sh | sha256sum | cut -d' ' -f1)"
          {
            echo "SHA=$SHA_A"
            echo "ACTOR=ci-integration"
            echo "BUNDLE_SHA256=$CHECKSUM"
          } > bundle_a/MANIFEST
          tar -C bundle_a -cf bundle_a.tar docker-compose.yml docker-compose.staging.yml scripts MANIFEST

          SSH_ORIGINAL_COMMAND="deploy $SHA_A" bash scripts/ci-deploy-entrypoint.sh < bundle_a.tar

          assert_eq "$(current_sha)" "$SHA_A" "deploy exitoso — current apunta a SHA_A"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "backup OK" "backup intentado y exitoso pese a ser 'primer deploy' (Postgres ya tenía datos)"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "migración OK" "migración corrió antes del cutover"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "deploy de $SHA_A exitoso" "deploy.sh reportó éxito"

          # shared/.env: el entrypoint debe haber validado permisos/
          # propietario y dejado el symlink exacto — antes de que cualquiera
          # de las aserciones de arriba (backup/migración/exitoso) pudiera
          # siquiera ocurrir, ya que el paso 4 corre antes que exec deploy.sh.
          ENV_LINK_TARGET="$(readlink "$SWARM_ROOT/releases/$SHA_A/.env")"
          assert_eq "$ENV_LINK_TARGET" "../../shared/.env" "releases/\$SHA_A/.env es un symlink exacto a ../../shared/.env"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "shared/.env validado" "el entrypoint registró la validación real de shared/.env"

          # Label OCI coincidente + digest real, verificados por el propio
          # entrypoint contra Docker real (no el `docker` falso de
          # test_ci_deploy_entrypoint_rejects_invalid_input.sh).
          assert_contains "$SWARM_ROOT/logs/deploy.log" "label_ok=true" "entrypoint verificó el label OCI org.opencontainers.image.revision contra Docker real"
          RESOLVED_DIGEST="$(cat "$SWARM_ROOT/releases/$SHA_A/.image-digest")"
          assert_eq "$RESOLVED_DIGEST" "$DIGEST_A" "el digest que el entrypoint grabó es el mismo digest real resuelto vía el registry local"

          # El digest pinneado es el que Compose realmente usó para levantar
          # "swarm" — no un tag mutable.
          RUNNING_IMAGE_ID="$(docker inspect --format '{{.Image}}' "$(dc ps -q swarm)")"
          EXPECTED_IMAGE_ID="$(docker image inspect --format '{{.Id}}' "$DIGEST_A")"
          assert_eq "$RUNNING_IMAGE_ID" "$EXPECTED_IMAGE_ID" "el contenedor 'swarm' corre exactamente la imagen del digest pinneado, no un tag mutable"

          curl -sf http://127.0.0.1:8000/health/ready > /tmp/health-ready.json
          assert_contains /tmp/health-ready.json '"status":"ok"' "/health/ready responde ok tras el deploy real"

      - name: "Scenario: backup exitoso + redeploy del mismo SHA (deploy.sh directo, sin el entrypoint)"
        run: |
          source scripts/ci-deploy-integration-lib.sh
          dc exec -T postgres \
              psql -U swarm -d swarm_trading_ci_deploy -c \
              "INSERT INTO ci_backup_marker (note) VALUES ('before-sha-b');"

          SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_B" ci-integration
          assert_eq "$(current_sha)" "$SHA_B" "deploy directo de SHA_B exitoso"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "backup OK" "backup real exitoso con Postgres ya corriendo y con datos"

          # Redeploy del mismo SHA — debe volver a funcionar de punta a
          # punta (backup de nuevo, migración de nuevo, sin cambios reales,
          # cutover, health OK).
          SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_B" ci-integration
          assert_eq "$(current_sha)" "$SHA_B" "redeploy del mismo SHA_B exitoso"

      - name: "Scenario: fallo de backup aborta antes de migrar, servicio activo intacto (SHA_E)"
        run: |
          source scripts/ci-deploy-integration-lib.sh
          POSTGRES_CID="$(dc ps -q postgres)"
          RUNNING_SWARM_BEFORE="$(dc ps -q swarm)"

          # Rompe pg_dump DENTRO del propio contenedor postgres en marcha —
          # el servidor sigue sano (pg_isready no lo toca), solo el binario
          # que deploy.sh invoca vía `docker exec` falla.
          docker exec "$POSTGRES_CID" sh -c 'mv /usr/bin/pg_dump /usr/bin/pg_dump.ci-real && printf "#!/bin/sh\nexit 1\n" > /usr/bin/pg_dump && chmod +x /usr/bin/pg_dump'

          set +e
          SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_E" ci-integration
          STATUS=$?
          set -e

          docker exec "$POSTGRES_CID" sh -c 'mv /usr/bin/pg_dump.ci-real /usr/bin/pg_dump'

          [ "$STATUS" -ne 0 ] || { echo "FAIL: se esperaba que deploy.sh fallara con pg_dump roto"; exit 1; }
          assert_contains "$SWARM_ROOT/logs/deploy.log" "backup falló — deploy abortado antes de la migración, servicio activo intacto" \
              "backup falló y el mensaje confirma que la migración nunca se invocó"
          assert_eq "$(current_sha)" "$SHA_B" "current sigue en SHA_B — el deploy fallido de SHA_E nunca llegó al cutover"
          assert_eq "$(dc ps -q swarm)" "$RUNNING_SWARM_BEFORE" "el contenedor 'swarm' (SHA_B) nunca se tocó"

      - name: "Scenario: migración fallida — servicio anterior intacto (SHA_D)"
        run: |
          source scripts/ci-deploy-integration-lib.sh
          RUNNING_SWARM_BEFORE="$(dc ps -q swarm)"

          set +e
          SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_D" ci-integration
          STATUS=$?
          set -e

          [ "$STATUS" -ne 0 ] || { echo "FAIL: se esperaba que deploy.sh fallara con una migración rota"; exit 1; }
          assert_contains "$SWARM_ROOT/logs/deploy.log" "migración falló — abortando, el servicio activo no fue tocado" \
              "migración falló con el mensaje esperado"
          assert_eq "$(current_sha)" "$SHA_B" "current sigue en SHA_B tras el fallo de migración de SHA_D"
          assert_eq "$(dc ps -q swarm)" "$RUNNING_SWARM_BEFORE" "el contenedor 'swarm' (SHA_B) nunca se tocó"
          curl -sf -o /dev/null http://127.0.0.1:8000/health/ready

      - name: "Scenario: health check fallido -> rollback automático a la imagen anterior (SHA_C)"
        run: |
          source scripts/ci-deploy-integration-lib.sh

          set +e
          SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_C" ci-integration
          STATUS=$?
          set -e

          [ "$STATUS" -ne 0 ] || { echo "FAIL: se esperaba que deploy.sh terminara en 1 (rollback automático es éxito parcial, no éxito total)"; exit 1; }
          assert_contains "$SWARM_ROOT/logs/deploy.log" "health check falló tras el deploy" "el health check real de /health/ready detectó el fallo"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "rollback automático a $SHA_B exitoso, servicio restaurado" \
              "rollback automático real a la imagen anterior, ejecutado por deploy.sh mismo"
          assert_eq "$(current_sha)" "$SHA_B" "current volvió a SHA_B tras el rollback automático"
          curl -sf -o /dev/null http://127.0.0.1:8000/health/ready

      - name: "Scenario: rollback manual cuyo propio health check falla — sin recursión (SHA_C como destino)"
        run: |
          source scripts/ci-deploy-integration-lib.sh
          START="$(date +%s)"
          set +e
          SWARM_ROOT="$SWARM_ROOT" scripts/rollback.sh "$SHA_C" ci-integration
          STATUS=$?
          set -e
          END="$(date +%s)"
          ELAPSED=$((END - START))

          [ "$STATUS" -ne 0 ] || { echo "FAIL: se esperaba que rollback.sh fallara (SHA_C nunca queda sano)"; exit 1; }
          assert_contains "$SWARM_ROOT/logs/deploy.log" "rollback a $SHA_C falló el health check tras levantar el stack" \
              "rollback.sh detectó el fallo de health check real"
          assert_contains "$SWARM_ROOT/logs/deploy.log" "no se reintenta automáticamente" "rollback.sh no reintenta — confirma ausencia de recursión"
          # Cota amplia (una sola pasada de HEALTH_CHECK_ATTEMPTS x
          # HEALTH_CHECK_INTERVAL_SEC =~ 60s): si hubiera recursión, el
          # tiempo real sería un múltiplo de esto, no una sola pasada.
          [ "$ELAPSED" -lt 100 ] || { echo "FAIL: rollback.sh tardó ${ELAPSED}s — sugiere reintentos recursivos, no una sola pasada"; exit 1; }
          echo "PASS: rollback.sh falló en una sola pasada (${ELAPSED}s), sin recursión"
          assert_eq "$(current_sha)" "$SHA_B" "current nunca se movió — el rollback manual fallido no llegó al cutover"

      - name: "Scenario: flock — dos ejecuciones concurrentes reales de deploy.sh"
        run: |
          source scripts/ci-deploy-integration-lib.sh

          # SHA_B en background (backup+migración+up+health real, toma
          # varios segundos) mientras un segundo deploy.sh real compite por
          # el mismo lockfile — no la simulación de flock en solitario que
          # ya cubre test_deploy_and_rollback_scripts.sh, sino los dos
          # scripts reales compitiendo.
          (SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_B" ci-integration-bg > "$RUNNER_TEMP/bg-deploy.log" 2>&1) &
          BG_PID=$!
          sleep 1

          set +e
          SWARM_ROOT="$SWARM_ROOT" scripts/deploy.sh "$SHA_F" ci-integration-fg > "$RUNNER_TEMP/fg-deploy.log" 2>&1
          FG_STATUS=$?
          set -e

          wait "$BG_PID"
          BG_STATUS=$?

          [ "$FG_STATUS" -ne 0 ] || { echo "FAIL: el segundo deploy.sh debía rechazarse por el lock"; cat "$RUNNER_TEMP/fg-deploy.log"; exit 1; }
          grep -qF "otro deploy o rollback está en curso" "$RUNNER_TEMP/fg-deploy.log" || \
              { echo "FAIL: falta el mensaje de rechazo por lock"; cat "$RUNNER_TEMP/fg-deploy.log"; exit 1; }
          echo "PASS: segundo deploy.sh (SHA_F) rechazado de inmediato por flock mientras el primero seguía corriendo"

          [ "$BG_STATUS" -eq 0 ] || { echo "FAIL: el deploy en background (SHA_B) debía completar exitosamente"; cat "$RUNNER_TEMP/bg-deploy.log"; exit 1; }
          echo "PASS: el deploy en background (SHA_B) completó una vez liberado el lock"
          assert_eq "$(current_sha)" "$SHA_B" "current es SHA_B — el intento rechazado (SHA_F) nunca tocó nada"

      - name: "Scenario: ningún servicio de docker-compose.staging.yml define build:"
        run: |
          ! docker compose -f docker-compose.staging.yml --env-file .ci-env-fixture config | grep -q "build:"
          echo "PASS: docker compose config resuelto no contiene ninguna clave 'build:' — todas las releases se despliegan solo por imagen"

      - name: Diagnostics on failure
        if: failure()
        run: |
          source scripts/ci-deploy-integration-lib.sh 2>/dev/null || true
          echo "--- deploy.log ---"
          cat "$SWARM_ROOT/logs/deploy.log" 2>/dev/null || echo "(sin deploy.log)"
          echo "--- docker compose ps ---"
          dc ps -a || true
          echo "--- docker compose logs ---"
          dc logs || true

      - name: Tear down
        if: always()
        run: |
          source scripts/ci-deploy-integration-lib.sh 2>/dev/null || true
          dc down -v --remove-orphans || true
          docker rm -f local-registry || true
